<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign in | FormFlow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            /* Lighter Gradient (No Black) */
            background: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 40%, #1e1b4b 100%);
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No scrolling */
        }

        /* ── Dotted Grid Background ── */
        .bg-dots {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.06) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* ── Colorful Ambient Orbs (Refined for lighter BG) ── */
        .orb {
            position: fixed;
            width: 60vh;
            height: 60vh;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.12;
            z-index: -2;
            pointer-events: none;
        }
        .orb-indigo { background: #6366f1; top: -10%; left: -5%; }
        .orb-teal { background: #2dd4bf; bottom: 10%; right: -5%; }
        .orb-orange { background: #f97316; top: 30%; right: 15%; opacity: 0.05; }

        /* ── Glass Container ─────────────────────────────────────────────── */
        .glass-container {
            background: rgba(15, 23, 42, 0.5); /* Matching navy/indigo base */
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            width: 100%;
            max-width: 400px; /* Fixed size as requested */
            padding: 2.5rem 2.25rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            animation: cardIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 0.8rem;
            font-size: 11px;
            font-weight: 800;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        /* ── Inputs ── */
        .input-group { margin-bottom: 1.25rem; }
        .input-label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            margin-left: 4px;
        }
        .field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 0.8rem;
            padding: 14px 18px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }
        .field:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .field::placeholder { color: rgba(255, 255, 255, 0.1); }

        /* ── Button ── */
        .btn-action {
            width: 100%;
            background: #fff;
            color: #000;
            padding: 14px;
            border-radius: 0.85rem;
            font-weight: 800;
            font-size: 15px;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 0.75rem;
            border: none;
            cursor: pointer;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.25rem;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .batch-row { overflow: hidden; transition: all 0.4s; max-height: 0; opacity: 0; }
        .batch-row.visible { max-height: 100px; opacity: 1; margin-bottom: 1.25rem; }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            padding: 12px 24px;
            border-radius: 10px;
            background: #1e1b4b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.5s;
        }
        @keyframes slideIn { from { top: -40px; opacity: 0; } to { top: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-dots"></div>
    <div class="orb orb-indigo"></div>
    <div class="orb orb-teal"></div>
    <div class="orb orb-orange"></div>

    <div class="flex flex-col items-center w-full px-8 max-w-xl mx-auto">
        <div class="brand-header">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-950 rounded-xl mb-4 border border-indigo-500/20 shadow-2xl">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 8L3 12L7 16M17 8L21 12L17 16M14 4L10 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter mb-1 text-white uppercase flex items-center justify-center gap-2">
                Form<span class="text-indigo-400">Flow</span>
            </h1>
            <p class="text-white/30 text-[10px] font-black tracking-[0.2em] uppercase text-center">
                Seamless campus form creation.
            </p>
        </div>

        <div class="glass-container">
            <div class="tabs" id="tabs-container">
                <div class="tab-btn active" id="login-tab" onclick="switchTab('login')">SIGN IN</div>
                <div class="tab-btn" id="signup-tab" onclick="switchTab('signup')">CREATE ACCOUNT</div>
            </div>

            <div id="form-content"></div>
        </div>
    </div>

    <script>
        let currentTab = 'login';

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('signup-tab').classList.toggle('active', tab === 'signup');
            renderForm();
        }

        function showToast(message) {
            const old = document.getElementById('toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.className = 'toast';
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function handleRoleChange(select) {
            const row = document.getElementById('batch-row');
            const label = document.getElementById('batch-label-text');
            const input = document.getElementById('batch');
            if (!row) return;

            if (select.value === 'student' || select.value === 'faculty') {
                row.classList.add('visible');
                label.textContent = select.value === 'student' ? 'Batch Year' : 'Joining Year';
                input.required = true;
            } else {
                row.classList.remove('visible');
                input.required = false;
            }
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button');
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.textContent = 'AUTHORIZING...';
            btn.style.opacity = '0.6';

            try {
                const fd = new FormData(form);
                const body = Object.fromEntries(fd.entries());
                const res = await fetch(type === 'login' ? '/auth/login' : '/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (res.ok) {
                    if (type === 'login') window.location.href = data.redirect || '/';
                    else {
                        showToast('ACCOUNT CREATED');
                        setTimeout(() => switchTab('login'), 1200);
                    }
                } else {
                    showToast(data.message || data.error || 'FAILED');
                }
            } catch (err) {
                showToast('CONNECTION LOST');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
                btn.style.opacity = '1';
            }
        }

        function renderForm() {
            const container = document.getElementById('form-content');
            if (currentTab === 'login') {
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, 'login')" style="animation: fadeIn 0.4s ease-out forwards;">
                        <div class="input-group">
                            <label class="input-label">Username</label>
                            <input type="email" name="email" required placeholder="name@college.edu" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Password</label>
                            <input type="password" name="password" required placeholder="••••••••" class="field">
                        </div>
                        <button type="submit" class="btn-action">SIGN IN</button>
                    </form>
                `;
            } else {
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, 'signup')" style="animation: fadeIn 0.4s ease-out forwards;">
                        <div class="input-group">
                            <label class="input-label">Identity</label>
                            <input type="text" name="name" required placeholder="Full Name" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">College Mail</label>
                            <input type="email" name="email" required placeholder="id@college.edu" class="field">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label class="input-label">Role</label>
                                <select name="user_type" required class="field" onchange="handleRoleChange(this)">
                                    <option value="" disabled selected>Role</option>
                                    <option value="student">Student</option>
                                    <option value="faculty">Faculty</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Dept</label>
                                <select name="department" required class="field">
                                    <option value="" disabled selected>Dept</option>
                                    <option value="CSE">CSE</option><option value="ECE">ECE</option><option value="ME">ME</option>
                                </select>
                            </div>
                        </div>
                        <div id="batch-row" class="batch-row">
                            <label class="input-label" id="batch-label-text">Year</label>
                            <input type="text" id="batch" name="batch" pattern="[0-9]{4}" maxlength="4" placeholder="2024" class="field">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Password</label>
                            <input type="password" name="password" required placeholder="Min. 8 characters" class="field">
                        </div>
                        <button type="submit" class="btn-action">CREATE ACCOUNT</button>
                    </form>
                `;
            }
        }
        renderForm();
    </script>
</body>
</html>
